name: Action Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Generate lockfile
        working-directory: testdata/ci-fixture
        run: npm install --package-lock-only
      - name: Test scalp-action
        uses: scal-p-labs/scalp-action@859d44532d9c0812c2e98ec7b157d0ce52fde82b # v0.6.1
        with:
          version: latest
          pr-context: internal
          working-directory: testdata/ci-fixture
