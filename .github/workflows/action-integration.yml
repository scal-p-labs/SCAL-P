name: Action Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - name: Generate lockfile
        working-directory: testdata/ci-fixture
        run: npm install --package-lock-only
      - name: Test scalp-action
        uses: scal-p-labs/scalp-action@7d7d8a3f9e7fd8cfde717731cf7f67883bb7d81f # v0.7.0
        with:
          version: latest
          pr-context: internal
          working-directory: testdata/ci-fixture
