name: Action Integration

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Generate lockfile
        working-directory: testdata/ci-fixture
        run: npm install --package-lock-only
      - name: Test scalp-action
        uses: scal-p-labs/scalp-action@562d94896bc16f9f9cc9eedaf9c3ac75c4137deb # v0.1.0
        with:
          version: latest
          pr-context: internal
          working-directory: testdata/ci-fixture
