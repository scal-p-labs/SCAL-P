name: Action Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
      - name: Generate lockfile
        working-directory: testdata/ci-fixture
        run: npm install --package-lock-only
      - name: Test scalp-action
        uses: scal-p-labs/scalp-action@7d7d8a3f9e7fd8cfde717731cf7f67883bb7d81f # v0.7.0
        with:
          version: latest
          pr-context: internal
          working-directory: testdata/ci-fixture
