name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: "v2.12.2"

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache: true
      - name: Build
        run: go build -o /dev/null ./cmd/scalp
      - name: Unit tests
        run: go test -count=1 -v ./...

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
      - name: E2E tests
        run: go test -tags=e2e -count=1 -timeout=120s -v ./e2e/

  dogfood:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
      - name: Generate lockfile
        working-directory: testdata/ci-fixture
        run: npm install --package-lock-only
      - uses: scal-p-labs/scalp-action@7d7d8a3f9e7fd8cfde717731cf7f67883bb7d81f # v0.7.0
        id: scalp
        with:
          version: latest
          pm: npm
          pr-context: internal
          policy: .scalp/policy.json
          output: .scalp/ci-report.json
          sarif: .scalp/scalp-report.sarif
          working-directory: testdata/ci-fixture
      - name: Upload SARIF to Code Scanning
        if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: ${{ steps.scalp.outputs.sarif-path }}
      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scalp-reports
          path: |
            ${{ steps.scalp.outputs.report-path }}
            ${{ steps.scalp.outputs.sarif-path }}
