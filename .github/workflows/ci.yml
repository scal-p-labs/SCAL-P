name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: "v2.12.2"

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - name: Build
        run: go build -o /dev/null ./cmd/scalp
      - name: Unit tests
        run: go test -count=1 -v ./...

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: E2E tests
        run: go test -tags=e2e -count=1 -timeout=120s -v ./e2e/

  dogfood:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Build scalp
        run: go build -o .bin/scalp ./cmd/scalp
      - name: Generate lockfile
        working-directory: testdata/ci-fixture
        run: npm install --package-lock-only
      - name: Run scalp ci (dogfooding)
        working-directory: testdata/ci-fixture
        run: |
          ../../.bin/scalp ci \
            --pr-context internal \
            --policy .scalp/policy.json \
            --output .scalp/ci-report.json \
            --sarif .scalp/scalp-report.sarif
      - name: Upload SARIF to Code Scanning
        if: always() && github.event.pull_request.head.repo.fork == false
        uses: github/codeql-action/upload-sarif@f25eda876ebb741d872b63b9f2c6dfdd77f14b83 # v4.35.5
        with:
          sarif_file: testdata/ci-fixture/.scalp/scalp-report.sarif
      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scalp-reports
          path: |
            testdata/ci-fixture/.scalp/ci-report.json
            testdata/ci-fixture/.scalp/scalp-report.sarif
