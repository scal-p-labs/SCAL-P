name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache: true
      - name: Build scalp bootstrap for dogfooding
        run: go build -o /tmp/scalp-bootstrap ./cmd/scalp

      - name: Smoke test bootstrap binary
        run: |
          /tmp/scalp-bootstrap version
          /tmp/scalp-bootstrap audit --help

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "v2.15.4"
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums with scalp
        run: |
          /tmp/scalp-bootstrap checksum dist/*.tar.gz dist/*.zip > dist/checksums.txt

      - name: Verify all artifacts with scalp (dogfooding)
        run: |
          for f in dist/*.tar.gz dist/*.zip; do
            echo "Verifying $(basename $f)..."
            /tmp/scalp-bootstrap verify --artifact "$f" --checksum dist/checksums.txt --ci
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tar.gz, dist/*.zip, dist/checksums.txt

      - name: Generate release report
        run: bash scripts/report.sh dist dist/checksums.txt

      - name: Upload release artifacts
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/checksums.txt \
            dist/report.txt \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
