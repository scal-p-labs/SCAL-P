name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - name: Build scalp bootstrap for dogfooding
        run: go build -o /tmp/scalp-bootstrap ./cmd/scalp

      - name: Smoke test bootstrap binary
        run: |
          /tmp/scalp-bootstrap version
          /tmp/scalp-bootstrap audit --help

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "v2.15.4"
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums with scalp
        run: |
          /tmp/scalp-bootstrap checksum dist/*.tar.gz dist/*.zip > dist/checksums.txt

      - name: Verify all artifacts with scalp (dogfooding)
        run: |
          for f in dist/*.tar.gz dist/*.zip; do
            echo "Verifying $(basename $f)..."
            /tmp/scalp-bootstrap verify --artifact "$f" --checksum dist/checksums.txt --ci
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.tar.gz, dist/*.zip, dist/checksums.txt

      - name: Upload scalp checksums to release
        run: gh release upload "${{ github.ref_name }}" dist/checksums.txt --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
